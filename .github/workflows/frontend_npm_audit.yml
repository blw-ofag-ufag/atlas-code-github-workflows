name: npm audit
run-name: npm audit
permissions:
  contents: read

on:
  workflow_call:

jobs:
  vulnrability-scan:
    name: Check for vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24


      # ---- pnpm audit gate (detects more npm specific issues) ----
      - name: pnpm audit (prod, high+)
        run: pnpm audit --prod --audit-level=high

