name: Build and Push Backend Docker Image to ECR
run-name: Build and Push to ECR - ${{ inputs.environment }} - ${{ inputs.version }}
on:
  workflow_call:
    inputs:
      enable:
        description: "Enable or disable the build and push workflow. Defaults to true."
        required: false
        default: true
        type: boolean
      environment:
        type: string
        required: true
        description: "environment to deploy to, used for selecting correct AWS credentials and CloudFront distribution based on environment specific secrets and variables"
      aws-region:
        type: string
        required: true
        description: "AWS region for deployment and AWS CLI commands"
      ecr-repository-name:
        required: true
        type: string
      version:
        required: true
        type: string
        description: "Version tag for the Docker image"
    secrets:
      AWS_OIDC_ROLE_ARN:
        description: "OIDC role ARN for AWS credentials"
        required: true
      AWS_DEPLOYMENT_ROLE_ARN:
        description: "Deployment role ARN for AWS credentials"
        required: true
    outputs:
      image:
        value: ${{ jobs.build-push-image.outputs.image }}

jobs:
  # Validate secrets to match an expected regex pattern to facilitate debugging of misconfigured secrets.
  validate-secret-values:
    runs-on: ubuntu-latest
    environment:  ${{ inputs.environment }}
    steps:
      - name: Validate secret values
        env:
          AWS_DEPLOYMENT_ROLE_ARN: ${{ secrets.AWS_DEPLOYMENT_ROLE_ARN }}
          AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
        run: |
          echo "Validating secret values for environment ${{ inputs.environment }}"
          AWS_ROLE_PATTERN='^arn:aws:iam::[0-9]{12}:role\/[A-Za-z0-9+=,.@_-]+$'
          echo "Roles should match pattern: $AWS_ROLE_PATTERN"
          if [[ ! "$AWS_DEPLOYMENT_ROLE_ARN" =~ $AWS_ROLE_PATTERN ]]; then
            echo "Invalid AWS_DEPLOYMENT_ROLE_ARN, does not match pattern $AWS_ROLE_PATTERN"
            echo "Secret value length: ${#AWS_DEPLOYMENT_ROLE_ARN}"
            exit 1
          fi
          echo "All secret values are valid"

  build-push-image:
    name: "Build and push docker image to ECR  ${{ inputs.environment }} - ${{ inputs.version }}"
    if: ${{ inputs.enable }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 5
    outputs:
      image: ${{ steps.push-image.outputs.image }}
    env:
      AWS_REGION: ${{ inputs.aws-region }}
      ECR_REPOSITORY: ${{inputs.ecr-repository-name}}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Print GitHub Context Safely
        run: |
          echo "--- GitHub Context ---"
          echo "${GITHUB_REPOSITORY}"
          echo "${GITHUB_REF}"
          echo "${GITHUB_SHA}"
      - name: Validate deployment inputs
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+){2}([.-][0-9A-Za-z]+)*$ ]] || { echo "Invalid version"; exit 1; }
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          [[ "${{ secrets.AWS_DEPLOYMENT_ROLE_ARN }}" =~ ^arn:aws:iam::[0-9]{12}:role\/[A-Za-z0-9+=,.@_-]+$ ]] || { echo "Invalid AWS_DEPLOYMENT_ROLE_ARN, does not match pattern ^arn:aws:iam::\d+:role\/[\w-]+$"; exit 1; }
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ format('v{0}', inputs.version) }}

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'corretto'

      - name: Restore Maven Cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Maven package
        run: mvn -B clean package -DskipTests -T 1C

      - name: Set image tag to GITHUB_ENV
        run: echo "IMAGE_TAG=${VERSION}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOYMENT_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=raw,value=${{ env.VERSION  }}
            type=sha

      - name: Build and push to ECR
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # Caching makes subsequent builds much faster
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: true

