name: "Semantic Release: creates releases based on commit messages, allowing for fully automated releases without manual intervention, but requires careful commit message formatting to work correctly"
run-name: "Semantic Release"
permissions:
  contents: write
  issues: write
  pull-requests: write

on:
  workflow_call:
    inputs:
      app-id:
        description: "GitHub App ID used to create the release token"
        required: true
        type: string
    secrets:
      SEMVER_PRIVATE_KEY:
        description: "GitHub App private key used to create the release token"
        required: true
    outputs:
      version:
        description: "The version released by semantic-release"
        value: ${{ jobs.semantic-release.outputs.version }}
jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.semantic-release.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: pnpm install
        run: pnpm install --frozen-lockfile --ignore-scripts

      - uses: actions/create-github-app-token@v3
        id: app-token
        env:
          GH_ORG_APP_ID: ${{ inputs.app-id }}
          GH_ORG_PRIVATE_KEY: ${{ secrets.GH_ORG_PRIVATE_KEY }}
        with:
          app-id: ${{ env.GH_ORG_APP_ID }}
          private-key: ${{ env.GH_ORG_PRIVATE_KEY }}

      - name: Semantic Release
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          pnpm semantic-release

# Alternative that does not require a package.json script for semantic-release, but is less efficient since it has to install the packages every time instead of using a cached version from node_modules
# Also there was an issue with a transitive dependency of semantic-release that caused the release to fail, using package.json we can override the version of that dependency to fix the issue, but with pnpm dlx we would have to wait for a new release of semantic-release that updates the dependency
